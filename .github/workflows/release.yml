name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Verify bundle exists
        run: ls -lh dist/hungry-machines.js

      - name: Create release and attach bundle
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hungry-machines.js
          fail_on_unmatched_files: true
          generate_release_notes: true
